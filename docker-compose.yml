version: '3.8'

services:
  db:
    image: postgres:latest
    container_name: db
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
    container_name: app
    command: ["/code/docker_scripts/app.sh"]
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./app:/code/app  # Монтируем только папку app
      - ./data:/code/data # Монтируем папку data для сохранения данных
      - ./scripts:/code/scripts # Монтируем папку scripts для доступа к скриптам

volumes:
  postgres_data: