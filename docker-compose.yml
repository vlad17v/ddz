version: '3.8'

services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:123@db:5432/db"
    volumes:
      - ./app:/code/app  # Монтируем только папку app
      - ./data:/code/data # Монтируем папку data для сохранения данных
      - ./scripts:/code/scripts # Монтируем папку scripts для доступа к скриптам

volumes:
  postgres_data: