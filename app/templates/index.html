{% extends 'base.html' %}

{% block content %}

<form id="todoForm" class="d-flex flex-column gap-2">
    <div class="form-floating">
        <input minlength="3" maxlength="200" type="text" class="form-control" id="title" name="title"
               placeholder="Введите задачу" required>
        <label for="title">Введите задачу</label>
    </div>
    <div class="form-floating">
        <textarea maxlength="500" class="form-control" placeholder="Введите описание задач" name="details" id="details"
                  style="height: 100px"></textarea>
        <label for="details">Введите описание задач</label>
    </div>

    <div class="form-group">
        <label for="tags-input">Теги (через запятую):</label>
        <input type="text" class="form-control" id="tags-input" name="tags"
               placeholder="Введите теги через запятую" autocomplete="off">
        <datalist id="tags-datalist"></datalist>
        <div id="tags-chips" class="d-flex flex-wrap gap-1 mt-1"></div>
    </div>

    <div class="form-floating">
        <input type="number" class="form-control" id="count_todos" name="count_todos"
               placeholder="Введите количество todo" min="1" max="100">
        <label for="count_todos">Введите количество todo</label>
    </div>

    <div class="form-group">
        <label for="image">Выберите изображение:</label>
        <input type="file" class="form-control" id="image" name="image" accept="image/*">
    </div>

    <button type="submit" class="btn btn-success">Добавить</button>
</form>

<script>
    const tagsInput = document.getElementById('tags-input');
    const tagsDatalist = document.getElementById('tags-datalist');
    const tagsChips = document.getElementById('tags-chips');
    let debounceTimer;

    tagsInput.addEventListener('input', function () {
        clearTimeout(debounceTimer);
        const value = this.value;
        const parts = value.split(',');
        const currentTag = parts[parts.length - 1].trim();
        if (currentTag.length < 1) {
            tagsDatalist.innerHTML = '';
            return;
        }
        debounceTimer = setTimeout(async () => {
            try {
                const resp = await fetch(`/tags/suggest/?q=${encodeURIComponent(currentTag)}`);
                const suggestions = await resp.json();
                const prefix = parts.slice(0, -1).join(',');
                tagsDatalist.innerHTML = '';
                suggestions.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = (prefix ? prefix + ', ' : '') + s;
                    tagsDatalist.appendChild(opt);
                });
                tagsInput.setAttribute('list', 'tags-datalist');
            } catch (e) {}
        }, 300);

        renderChips(value);
    });

    function renderChips(value) {
        tagsChips.innerHTML = '';
        value.split(',').map(t => t.trim()).filter(Boolean).forEach(tag => {
            const chip = document.createElement('span');
            chip.className = 'badge bg-secondary';
            chip.textContent = tag;
            tagsChips.appendChild(chip);
        });
    }

    document.getElementById('todoForm').addEventListener('submit', function (e) {
        e.preventDefault();

        const formData = new FormData(this);
        if (!formData.get('count_todos')) {
            formData.delete('count_todos');
        }
        formData.append('source', 'Созданная')

        fetch('/todo/add/', {
            method: 'POST',
            body: formData
        })
                .then(res => {
                    if (res.status === 401) {
                        window.location.href = '/todo/401/';
                        return;
                    }
                    return res.json();
                })
                .then(data => {
                    if (data == null) {
                        window.location.href = '/todo/401/';
                    } else {
                        window.location.href = '/todo/home/';
                    }
                })
                .catch(error => console.error('Ошибка:', error));

        this.reset();
        tagsChips.innerHTML = '';
    });
</script>

{% endblock content %}
