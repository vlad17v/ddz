<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowers</title>
</head>
<body>
    <h1>Flowers</h1>
    <ul>
        {% for flower in flowers %}
            <li>{{ flower.name }} - {{ flower.color }} - ${{ flower.price }} - Quantity: {{ flower.quantity }}</li>
        {% endfor %}
    </ul>
    <a href="/client/add_flower/">Add Flower</a>
</body>
</html>
