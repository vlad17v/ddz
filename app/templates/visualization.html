{% extends 'base.html' %}

{% block content %}

<img style="width: 100%; margin: 0 auto;" src="{{ image_url }}" alt="Todo Visualization">
<a href="/todo/shuffle-tag" style="text-align: center">Перемешать все теги</a>

{% for tag_name, count in tag_counts.items() %}
<div style="margin-top: 20px;">
    <h3>{{ tag_name }}: {{ count }}</h3>
    <a href="/todo/list/?skip=0&limit=10&tag={{ tag_name }}">Перейти к {{ tag_name }}</a>
</div>
{% endfor %}

{% endblock content %}
