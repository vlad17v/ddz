<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/layout.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
</head>


<body class="app-shell">
{% set current_path = request.url.path %}

<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModal" aria-modal="true" role="dialog"
     style="display: none;">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleModalTitle">Вы уверены?</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Нет</button>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', path='js/modal.js') }}"></script>
<script defer src="{{ url_for('static', path='js/sidebar.js') }}"></script>

<button class="sidebar-backdrop" type="button" id="sidebarBackdrop" aria-label="Закрыть меню"></button>

<aside class="app-sidebar" id="appSidebar" aria-label="Основное меню">
    <div class="sidebar-brand">
        <div>
            <a class="sidebar-logo" href="/todo/home/">ToDo</a>
            <p class="sidebar-subtitle">список задач</p>
        </div>
        <button class="sidebar-close d-lg-none" type="button" id="sidebarCloseButton" aria-label="Закрыть боковое меню">
            <span class="sidebar-close-copy">
                <span class="sidebar-close-title">Скрыть меню</span>
                <span class="sidebar-close-hint">Вернуться к содержимому</span>
            </span>
        </button>
    </div>

    <nav class="sidebar-nav">
        <a class="sidebar-link {% if current_path == '/todo/home/' %}active{% endif %}" href="/todo/home/">
            Главная
        </a>
        <a class="sidebar-link {% if current_path == '/todo/list/' %}active{% endif %}" href="/todo/list/">
            Список дел
        </a>
        <a class="sidebar-link {% if current_path == '/todo/export/' %}active{% endif %}" href="/todo/export/">
            Импорт и экспорт
        </a>
        <a class="sidebar-link {% if current_path == '/todo/visualize/' %}active{% endif %}" href="/todo/visualize/">
            Визуализация
        </a>
        <a class="sidebar-link {% if current_path == '/todo/top-words/' %}active{% endif %}" href="/todo/top-words/">
            Популярные слова
        </a>
        <a class="sidebar-link {% if current_path == '/todo/generate/' %}active{% endif %}" href="/todo/generate/">
            Генерация
        </a>
        <a class="sidebar-link {% if current_path.startswith('/todo/import-log') %}active{% endif %}" href="/todo/import-log/">
            Импортированные Excel-файлы
        </a>
        <a class="sidebar-link {% if current_path.startswith('/todo/import-issues') %}active{% endif %}" href="/todo/import-issues/">
            Импорт issue
        </a>
        <a class="sidebar-link {% if current_path.startswith('/flowers') %}active{% endif %}" href="/flowers/">
            Java приложение
        </a>
        <a class="sidebar-link {% if current_path == '/todo/info-tasks/' %}active{% endif %}" href="/todo/info-tasks/">
            Информация
        </a>
    </nav>

    <a class="sidebar-link sidebar-link-danger mt-auto" href="/auth/logout">Выйти</a>
</aside>

<div class="app-content">
    <header class="app-header">
        <button class="sidebar-toggle" type="button" id="sidebarToggle" aria-controls="appSidebar" aria-expanded="true">
            <span class="sidebar-toggle-icon" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </span>
            <span class="sidebar-toggle-copy">
                <span class="sidebar-toggle-title">Меню</span>
                <span class="sidebar-toggle-hint">Показать или скрыть навигацию</span>
            </span>
        </button>
        <h1 class="app-title">
            <a href="/todo/home/">ToDo</a>
            <span>список задач</span>
        </h1>
    </header>

    <main class="app-main d-flex flex-column gap-3">
        {% block content %}

        {% endblock content %}
    </main>
</div>

</body>
</html>
